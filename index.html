<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OctraScan – Octra RPC Explorer</title>

  <!-- Tailwind Play CDN – no build step needed -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    /* Tailwind config – dark‑mode (class) + a custom primary colour */
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#2b7cff',
          }
        }
      }
    };
  </script>

  <style>
    .spinner {
      border-top-color: #2b7cff;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

  <!-- ────────────────────── Header ────────────────────── -->
  <header class="bg-primary text-white shadow-md">
    <nav class="max-w-7xl mx-auto flex items-center justify-between p-4">
      <a href="#/" class="text-2xl font-bold tracking-wider">OctraScan</a>

      <!-- Dark‑mode toggle -->
      <button id="themeBtn"
        class="p-2 rounded hover:bg-primary/80 transition-colors"
        aria-label="Toggle dark mode">
        <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6" fill="currentColor" viewBox="0 0 20 20">
          <!-- sun (default) -->
          <path d="M10 2a1 1 0 011 1v2a1 1 0 11-2 0V3a1 1 0 011-1zm5.657 2.343a1 1 0 011.414 0l1.414
            1.415a1 1 0 01-1.415 1.414L16.656 5.757a1 1 0 010-1.414zM18
            9a1 1 0 110 2h-2a1 1 0 110-2h2zM14.657 14.657a1 1 0 010
            1.415l-1.414 1.415a1 1 0 01-1.415-1.415l1.415-1.415a1 1 0 011.414
            0zM10 14a4 4 0 100-8 4 4 0 000 8zm-5-4a1 1 0 110-2h2a1 1
            0 110 2H5zM5.343 5.757a1 1 0 010-1.414L6.757 2.93a1 1 0 011.415
            1.415L6.757 5.757a1 1 0 01-1.414 0zM4 9a1 1 0 110 2H2a1 1
            0 110-2h2zM5.343 13.414a1 1 0 011.414 0l1.415 1.414a1 1 0
            01-1.415 1.414L5.343 14.828a1 1 0 010-1.414z"/>
        </svg>
      </button>
    </nav>
  </header>

  <!-- ────────────────────── Main container (SPA) ────────────────────── -->
  <main id="app" class="flex-1 max-w-7xl mx-auto p-4"></main>

  <!-- ────────────────────── Footer ────────────────────── -->
  <footer class="bg-primary text-white text-center py-3">
    <p class="text-sm">
      OctraScan – <a href="https://github.com/your‑github‑user/octrascan"
        class="underline hover:text-gray-200" target="_blank" rel="noopener">
        GitHub
      </a>
    </p>
  </footer>

  <!-- ────────────────────── JavaScript (router + RPC) ────────────────────── -->
  <script>
    /* ==============================================================
       1️⃣  CONFIGURATION
       ============================================================== */
    // ---- RPC endpoint (change only if the node address moves) ----
    // We call the Netlify function which forwards the request.
    const RPC_PROXY = '/.netlify/functions/rpc-proxy';

    // If you prefer to keep the raw RPC address in the function,
    // set it as an environment variable named OCTRA_RPC_URL on Netlify.
    // The function will read that variable.

    /* ==============================================================
       2️⃣  SIMPLE JSON‑RPC helper
       ============================================================== */
    async function rpc(method, params = []) {
      const payload = {
        jsonrpc: "2.0",
        id: Date.now(),
        method,
        params
      };
      const resp = await fetch(RPC_PROXY, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const json = await resp.json();
      if (json.error) {
        const msg = json.error.message || JSON.stringify(json.error);
        throw new Error(msg);
      }
      return json.result;
    }

    /* ==============================================================
       3️⃣  UI helpers
       ============================================================== */
    const app = document.getElementById('app');

    function setHTML(html) { app.innerHTML = html; }

    function spinner(msg = "Loading…") {
      return `
        <div class="flex flex-col items-center py-12">
          <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full spinner"></div>
          <p class="mt-4 text-gray-600 dark:text-gray-300">${msg}</p>
        </div>`;
    }

    function renderKeyValue(obj) {
      const rows = Object.entries(obj).map(([k, v]) => `
        <div class="flex justify-between py-1 border-b border-gray-200 dark:border-gray-700">
          <span class="font-medium text-gray-700 dark:text-gray-300">${k}</span>
          <span class="text-gray-800 dark:text-gray-100 break-all">${v}</span>
        </div>`).join('');
      return `<div class="bg-white dark:bg-gray-800 p-4 rounded-lg shadow">${rows}</div>`;
    }

    function jsonPrettify(data) {
      const txt = JSON.stringify(data, null, 2);
      const escaped = txt.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return `<pre class="bg-gray-800 text-gray-100 p-4 rounded-lg overflow-x-auto whitespace-pre-wrap">${escaped}</pre>`;
    }

    /* ==============================================================
       4️⃣  Search handling
       ============================================================== */
    function handleSearch(e) {
      e.preventDefault();
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;

      // Heuristics – match the same patterns used by the docs
      if (/^0x[0-9a-fA-F]{64}$/.test(q)) {
        // tx hash
        location.hash = `#/tx/${q}`;
      } else if (/^0x[0-9a-fA-F]{40}$/.test(q)) {
        // address
        location.hash = `#/address/${q}`;
      } else if (/^\d+$/.test(q)) {
        // epoch number (or block height – not exposed by RPC; we treat it as epoch)
        location.hash = `#/epoch/${q}`;
      } else {
        // fallback – try the generic search method (octra_search)
        location.hash = `#/search/${encodeURIComponent(q)}`;
      }
    }

    /* ==============================================================
       5️⃣  Page renderers
       ============================================================== */
    async function renderHome() {
      setHTML(`
        ${searchBar()}
        <section id="homeContent">${spinner('Fetching node info…')}</section>`);

      document.getElementById('searchForm').addEventListener('submit', handleSearch);

      try {
        const [ver, status, stats] = await Promise.all([
          rpc('node_version', []),
          rpc('node_status', []),
          rpc('node_stats', [])
        ]);

        // Recent confirmed transactions (limit 5 for brevity)
        let recentTxs = [];
        try {
          const rt = await rpc('octra_recentTransactions', [5, 0]);
          recentTxs = rt.transactions || [];
        } catch (_) { /* ignore – optional */ }

        const recentHtml = recentTxs.map(t => `
          <a href="#/tx/${t.hash}" class="block p-2 bg-white dark:bg-gray-800 rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition">
            <div class="flex justify-between text-sm">
              <span class="font-mono text-primary">${t.hash.slice(0, 10)}…${t.hash.slice(-10)}</span>
              <span>${t.amount}</span>
            </div>
          </a>`).join('');

        const content = `
          <h2 class="text-2xl font-bold mb-4 text-primary">Node Info</h2>
          <div class="grid gap-4 md:grid-cols-2">
            ${renderKeyValue(ver)}
            ${renderKeyValue(status)}
            ${renderKeyValue(stats)}
          </div>

          <h2 class="mt-8 text-2xl font-bold mb-4 text-primary">Recent Transactions</h2>
          ${recentTxs.length ? `<div class="space-y-2">${recentHtml}</div>` : '<p class="text-gray-600">No recent txs.</p>'}
        `;
        document.getElementById('homeContent').innerHTML = content;
      } catch (err) {
        document.getElementById('homeContent').innerHTML = `<p class="text-red-600">Error: ${err.message}</p>`;
      }
    }

    async function renderAddress(address) {
      setHTML(`
        ${searchBar()}
        <section id="addrContent">${spinner('Fetching address…')}</section>`);
      document.getElementById('searchForm').addEventListener('submit', handleSearch);

      try {
        // Try the more detailed account call first – if it fails fall back to balance
        let data;
        try {
          data = await rpc('octra_account', [address]);
        } catch (_) {
          data = await rpc('octra_balance', [address]);
        }

        const content = `
          <h2 class="text-2xl font-bold mb-4 text-primary">Address ${address}</h2>
          ${renderKeyValue(data)}
        `;
        document.getElementById('addrContent').innerHTML = content;
      } catch (err) {
        document.getElementById('addrContent').innerHTML = `<p class="text-red-600">Error: ${err.message}</p>`;
      }
    }

    async function renderTx(hash) {
      setHTML(`
        ${searchBar()}
        <section id="txContent">${spinner('Fetching transaction…')}</section>`);
      document.getElementById('searchForm').addEventListener('submit', handleSearch);

      try {
        const tx = await rpc('octra_transaction', [hash]);
        const content = `
          <h2 class="text-2xl font-bold mb-4 text-primary">Transaction ${hash}</h2>
          ${renderKeyValue(tx)}
        `;
        document.getElementById('txContent').innerHTML = content;
      } catch (err) {
        document.getElementById('txContent').innerHTML = `<p class="text-red-600">Error: ${err.message}</p>`;
      }
    }

    async function renderEpoch(id) {
      setHTML(`
        ${searchBar()}
        <section id="epochContent">${spinner('Fetching epoch …')}</section>`);
      document.getElementById('searchForm').addEventListener('submit', handleSearch);

      try {
        const ep = await rpc('epoch_get', [parseInt(id, 10)]);
        const content = `
          <h2 class="text-2xl font-bold mb-4 text-primary">Epoch ${id}</h2>
          ${renderKeyValue(ep)}
        `;
        document.getElementById('epochContent').innerHTML = content;
      } catch (err) {
        document.getElementById('epochContent').innerHTML = `<p class="text-red-600">Error: ${err.message}</p>`;
      }
    }

    async function renderSearch(query) {
      // Use the generic octra_search method – it returns type‑specific data.
      setHTML(`
        ${searchBar()}
        <section id="searchContent">${spinner('Searching…')}</section>`);
      document.getElementById('searchForm').addEventListener('submit', handleSearch);

      try {
        const res = await rpc('octra_search', [query]);
        let html = `<h2 class="text-2xl font-bold mb-4 text-primary">Search result for “${query}”</h2>`;
        if (res.type === 'transaction') {
          html += renderKeyValue(res);
        } else if (res.type === 'account') {
          html += renderKeyValue(res);
        } else if (res.type === 'epoch') {
          html += renderKeyValue(res);
        } else {
          html += jsonPrettify(res);
        }
        document.getElementById('searchContent').innerHTML = html;
      } catch (err) {
        document.getElementById('searchContent').innerHTML = `<p class="text-red-600">Error: ${err.message}</p>`;
      }
    }

    /* -------------------------------------------------
       6️⃣  Search bar component (re‑used on every page)
       ------------------------------------------------- */
    function searchBar() {
      return `
        <form id="searchForm" class="flex w-full max-w-2xl mx-auto mb-8">
          <input id="searchInput" type="text"
            placeholder="Search tx hash, address or epoch number…"
            class="flex-1 px-4 py-2 rounded-l-md bg-white dark:bg-gray-700 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary" />
          <button type="submit"
            class="px-5 py-2 bg-primary text-white rounded-r-md hover:bg-primary/90 transition-colors">
            Search
          </button>
        </form>`;
    }

    /* ==============================================================
       7️⃣  Router – hash based (no library)
       ============================================================== */
    function router() {
      const hash = location.hash.slice(1); // remove leading '#'
      const parts = hash.split('/');
      // routes:
      //   /        → home
      //   /address/<addr>
      //   /tx/<hash>
      //   /epoch/<id>
      //   /search/<query>
      if (!parts[0] || parts[0] === '') {
        renderHome();
      } else if (parts[0] === 'address' && parts[1]) {
        renderAddress(decodeURIComponent(parts[1]));
      } else if (parts[0] === 'tx' && parts[1]) {
        renderTx(decodeURIComponent(parts[1]));
      } else if (parts[0] === 'epoch' && parts[1]) {
        renderEpoch(decodeURIComponent(parts[1]));
      } else if (parts[0] === 'search' && parts[1]) {
        renderSearch(decodeURIComponent(parts.slice(1).join('/')));
      } else {
        // unknown route → home
        renderHome();
      }
    }

    window.addEventListener('hashchange', router);
    window.addEventListener('load', router);

    /* ==============================================================
       8️⃣  Dark‑mode toggle
       ============================================================== */
    const themeBtn   = document.getElementById('themeBtn');
    const themeIcon  = document.getElementById('themeIcon');

    function setTheme(dark) {
      if (dark) {
        document.documentElement.classList.add('dark');
        themeIcon.innerHTML = `
          <path d="M10 2a8 8 0 00-8 8c0 .9.145 1.77.414 2.596A10.024 10.024 0 0110 18a9.99 9.99 0 009.59-6.515 6.983 6.983 0 00-1.757-.442 7 7 0 01-7-7c0-.702.11-1.38.311-2.024A8.056 8.056 0 0010 2z"/>
        `;
      } else {
        document.documentElement.classList.remove('dark');
        themeIcon.innerHTML = `
          <path d="M10 2a1 1 0 011 1v2a1 1 0 11-2 0V3a1 1 0 011-1zm5.657 2.343a1 1 0 011.414 0l1.414
            1.415a1 1 0 01-1.415 1.414L16.656 5.757a1 1 0 010-1.414zM18 9a1 1 0 110 2h-2a1 1 0 110-2h2zM14.657 14.657a1 1 0 010
            1.415l-1.414 1.415a1 1 0 01-1.415-1.415l1.415-1.415a1 1 0 011.414 0zM10 14a4 4 0 100-8 4 4 0 000 8zm-5-4a1 1 0 110-2h2a1 1
            0 110 2H5zM5.343 5.757a1 1 0 010-1.414L6.757 2.93a1 1 0 011.415 1.415L6.757 5.757a1 1 0 01-1.414 0zM4 9a1 1
            0 110 2H2a1 1 0 110-2h2zM5.343 13.414a1 1 0 011.414 0l1.415 1.414a1 1 0 01-1.415 1.414L5.343 14.828a1 1
            0 010-1.414z"/>
        `;
      }
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    const stored = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(stored ? stored === 'dark' : prefersDark);

    themeBtn.addEventListener('click', () => setTheme(!document.documentElement.classList.contains('dark')));
  </script>
</body>
</html>
